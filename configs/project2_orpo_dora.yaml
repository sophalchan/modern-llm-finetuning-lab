model_id: "Qwen/Qwen2.5-7B-Instruct"
dataset_name: "Intel/orca_dpo_pairs"
train_samples: 2000
test_size: 0.1
use_dora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
output_dir: "orpo_qwen_final"
orpo:
  learning_rate: 8.0e-6
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_prompt_length: 1024
  max_length: 2048
  beta: 0.1
  logging_steps: 10
  eval_steps: 50
